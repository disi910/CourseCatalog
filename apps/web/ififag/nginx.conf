# Nginx config for serving the React SPA (single-page app)
# This runs INSIDE the coursecatalog-frontend container
#
# Key concept: React handles routing in the browser (client-side routing)
# If someone refreshes on /coursecatalog/catalog, nginx needs to serve
# index.html (not look for a file called "catalog"), then React takes over

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # try_files tries each path in order:
        # 1. $uri - exact file match (e.g., /assets/main.js)
        # 2. $uri/ - directory match
        # 3. /index.html - fallback: serve the React app, which handles routing
        try_files $uri $uri/ /index.html;
    }
}
